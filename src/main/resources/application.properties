spring.application.name=power-asset-intelligence

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/power_asset_intelligence}
spring.datasource.username=${DB_USERNAME:power_asset}
spring.datasource.password=${DB_PASSWORD:power_asset}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
server.error.include-message=never
server.error.include-binding-errors=never
