spring.application.name=power-asset-intelligence

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/power_asset_intelligence}
spring.datasource.username=${DB_USERNAME:power_asset}
spring.datasource.password=${DB_PASSWORD:power_asset}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
server.error.include-message=never
server.error.include-binding-errors=never

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.admin.auto-create=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.powerassetintelligence.infrastructure.messaging.kafka.message.TelemetryMessage
spring.kafka.consumer.properties.spring.json.trusted.packages=com.powerassetintelligence.infrastructure.messaging.kafka.message
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.concurrency=${KAFKA_TELEMETRY_CONCURRENCY:3}
spring.kafka.listener.observation-enabled=true

app.kafka.telemetry.raw-topic=${KAFKA_TELEMETRY_RAW_TOPIC:telemetry.raw.v1}
app.kafka.telemetry.dead-letter-topic=${KAFKA_TELEMETRY_DLT_TOPIC:telemetry.raw.v1.dlt}
app.kafka.telemetry.consumer-group=${KAFKA_TELEMETRY_CONSUMER_GROUP:power-asset-telemetry-ingestion}
app.kafka.telemetry.send-timeout-ms=${KAFKA_TELEMETRY_SEND_TIMEOUT_MS:5000}
app.kafka.telemetry.retry-attempts=${KAFKA_TELEMETRY_RETRY_ATTEMPTS:3}
app.kafka.telemetry.retry-backoff-ms=${KAFKA_TELEMETRY_RETRY_BACKOFF_MS:1000}
